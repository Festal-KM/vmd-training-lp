<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VMD研修パンフレット（PDF）</title>
<style>
  @page{ size:A4; margin:0; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#fff; }
  .sheet{ width:210mm; height:297mm; overflow:hidden; display:block; page-break-after:always; break-after:page; }
  .sheet:last-child{ page-break-after:auto; break-after:auto; }
  .sheet img{ width:210mm; height:297mm; object-fit:cover; display:block; }
  @media screen{
    body{ background:#5b6b70; padding:24px 0; }
    .sheet{ margin:0 auto 24px; box-shadow:0 10px 40px rgba(0,0,0,.3); }
  }
</style>
</head>
<body>
  <div class="sheet"><img src="pdf_pages/full1.png" alt="パンフレット 1ページ"></div>
  <div class="sheet"><img src="pdf_pages/full2.png" alt="パンフレット 2ページ"></div>
  <div class="sheet"><img src="pdf_pages/full3.png" alt="パンフレット 3ページ"></div>
<script>
  (function(){
    function go(){ setTimeout(function(){ window.print(); }, 400); }
    var imgs=[].slice.call(document.images);
    var left=imgs.length;
    if(!left){ window.addEventListener('load', go, {once:true}); return; }
    imgs.forEach(function(im){
      if(im.complete){ if(--left===0) go(); }
      else im.addEventListener('load', function(){ if(--left===0) go(); }, {once:true});
    });
  })();
</script>
</body>
</html>
